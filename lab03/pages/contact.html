<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li>
            <a href="../index.html"> Home </a>
          </li>
          <li>
            <a href="./about.html"> About Me </a>
          </li>
          <li>
            <a href="./contact.html"> Contact </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <form action="./contact.html" method="GET">
        <h2>Зв’яжіться зі мною</h2>

        <fieldset>
          <label for="name">Ім’я *:</label>
          <input
            placeholder="Ваше ім’я"
            id="name"
            name="name"
            type="text"
            required
            minlength="2"
            maxlength="30"
          />
        </fieldset>

        <fieldset>
          <label for="email">Email *:</label>
          <input
            placeholder="Ваша почта"
            id="email"
            name="email"
            type="email"
            required
          />
        </fieldset>

        <fieldset>
          <label for="tel">Phone Number:</label>
          <input
            placeholder="Ваш номер телефона"
            id="tel"
            name="tel"
            type="tel"
            maxlength="16"
          />
        </fieldset>

        <fieldset>
          <label for="topic">Тема:</label>
          <select id="topic" name="topic">
            <option selected value="study">Навчання</option>
            <option value="work">Співпраця</option>
            <option value="other">Інше</option>
          </select>
        </fieldset>

        <fieldset>
          <label>Спосіб зв'язку</label>
          <label
            ><input type="radio" name="contactWay" value="email" checked />
            Email</label
          >
          <label
            ><input type="radio" name="contactWay" value="phone" />
            Телефон</label
          >
        </fieldset>

        <fieldset>
          <label for="message">Повідомлення:</label><br />
          <textarea
            style="resize: none"
            placeholder="Введіть ваше повідомлення"
            id="message"
            name="message"
            rows="5"
            cols="30"
          ></textarea>
        </fieldset>

        <fieldset>
          <label>
            <input type="checkbox" name="agree" required />
            Погоджуюсь з правилами
          </label>
        </fieldset>

        <button type="submit">Надіслати</button>
        <button type="reset">Очіщити</button>
      </form>
    </main>
    <footer>&copy; 2026 Джаваншірі Кіян</footer>
  </body>
</html>
