<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/reset.css" />
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="../styles/responsive.css" />
    <title>Contact</title>
    <script src="../js/main.js" defer></script>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <button data-menu-btn aria-expanded="false" class="burger">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-align-left"
          >
            <line x1="17" y1="10" x2="3" y2="10"></line>
            <line x1="21" y1="6" x2="3" y2="6"></line>
            <line x1="21" y1="14" x2="3" y2="14"></line>
            <line x1="17" y1="18" x2="3" y2="18"></line>
          </svg>
        </button>
        <nav data-menu class="burger-nav is-open">
          <ul class="burger-nav__list">
            <li class="burger-nav__list-item">
              <a class="burger-nav__list-link" href="../index.html"> Home </a>
            </li>
            <li class="burger-nav__list-item">
              <a class="burger-nav__list-link" href="./about.html">
                About Me
              </a>
            </li>
            <li class="burger-nav__list-item">
              <a class="burger-nav__list-link" href="./contact.html">
                Contact
              </a>
            </li>
          </ul>
        </nav>
        <nav class="header__nav">
          <ul class="header__nav-list">
            <li class="header__nav-item">
              <a class="header__nav-link" href="../index.html"> Home </a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link" href="./about.html"> About Me </a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link" href="./contact.html"> Contact </a>
            </li>
          </ul>
        </nav>
        <button data-theme-toggle class="theme-toggle">
          <div class="theme-toggle-sun">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="feather feather-sun"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </div>
          <div class="theme-toggle-moon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="feather feather-moon"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </div>
        </button>
      </div>
    </header>
    <div class="container">
      <main class="contact">
        <form class="contact__form" action="./contact.html" method="GET">
          <h2 class="contact__title">Зв’яжіться зі мною</h2>

          <fieldset class="contact__fieldset">
            <label class="contact__label" for="name">Ім’я *:</label>
            <input
              class="contact__input"
              placeholder="Ваше ім’я"
              id="name"
              name="name"
              type="text"
              required
              minlength="2"
              maxlength="30"
            />
          </fieldset>

          <fieldset class="contact__fieldset">
            <label class="contact__label" for="email">Email *:</label>
            <input
              class="contact__input"
              placeholder="Ваша почта"
              id="email"
              name="email"
              type="email"
              required
            />
          </fieldset>

          <fieldset class="contact__fieldset">
            <label class="contact__label" for="tel">Phone Number:</label>
            <input
              class="contact__input"
              placeholder="Ваш номер телефона"
              id="tel"
              name="tel"
              type="tel"
              maxlength="16"
            />
          </fieldset>

          <fieldset class="contact__fieldset">
            <label class="contact__label" for="topic">Тема:</label>
            <select class="contact__select" id="topic" name="topic">
              <option selected value="study">Навчання</option>
              <option value="work">Співпраця</option>
              <option value="other">Інше</option>
            </select>
          </fieldset>

          <fieldset class="contact__fieldset">
            <span class="contact__label">Спосіб зв'язку</span>

            <label class="contact__radio-label">
              <input
                class="contact__radio"
                type="radio"
                name="contactWay"
                value="email"
                checked
              />
              Email
            </label>

            <label class="contact__radio-label">
              <input
                class="contact__radio"
                type="radio"
                name="contactWay"
                value="phone"
              />
              Телефон
            </label>
          </fieldset>

          <fieldset class="contact__fieldset">
            <label class="contact__label" for="message">Повідомлення:</label>
            <textarea
              class="contact__textarea"
              placeholder="Введіть ваше повідомлення"
              id="message"
              name="message"
              rows="5"
            ></textarea>
          </fieldset>

          <fieldset class="contact__fieldset">
            <label class="contact__checkbox-label">
              <input
                class="contact__checkbox"
                type="checkbox"
                name="agree"
                required
              />
              Погоджуюсь з правилами
            </label>
          </fieldset>

          <div class="contact__actions">
            <button class="contact__button" type="submit">Надіслати</button>
            <button
              class="contact__button contact__button--secondary"
              type="reset"
            >
              Очистити
            </button>
          </div>
        </form>
      </main>
    </div>
    <button data-top hidden class="btn-top">↑</button>
    <footer class="footer">
      <div class="container">
        &copy; <span data-footer></span> Джаваншірі Кіян
      </div>
    </footer>
  </body>
</html>
